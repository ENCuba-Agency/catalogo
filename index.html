<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENCuba Agencia - Catálogo Optimizado</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header>
        <h1>🇨🇺 ENCuba Agencia</h1>
        <div class="contenedor-buscador">
            <input type="text" id="buscador" placeholder="🔎 Buscar en título...">
        </div>
        <div class="wrapper-filtros">
            <div class="filtros-tipo" id="contenedorFiltros">
                <button onclick="filtrarPorTipo('todo')" class="active">🌟 Todo</button>
                <button onclick="filtrarPorTipo('renta')">🏠 Rentas</button>
                <button onclick="filtrarPorTipo('hotel')">🏨 Hoteles</button>
                <button onclick="filtrarPorTipo('pasadia')">🏊‍♂️ Pasadías</button>
                <button onclick="filtrarPorTipo('piscina')">🌊 Piscinas</button>
                <button onclick="filtrarPorTipo('transporte')">🚌 Transporte</button>
                <button onclick="filtrarPorTipo('ofertafinsemana')">🗓️ Fin de Semana</button>
                <button onclick="filtrarPorTipo('ofertavacaciones')">🍹 Vacaciones</button>
            </div>
            <div class="indicador-scroll" id="flechaIndicadora">→</div>
        </div>
    </header>

    <main>
        <div id="contenedor-items" class="galeria"></div>

        <div class="paginacion">
            <button id="btn-anterior" onclick="cambiarPagina(-1)">⬅️ Anterior</button>
            <span id="info-paginacion">Página 1</span>
            <button id="btn-siguiente" onclick="cambiarPagina(1)">Siguiente ➡️</button>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 ENCuba-Agency - Catálogo Digital - Ofertas Recientes</p>
    </footer>

    <script src="js/anuncios.js"></script>
</body>
</html>
